name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: format check
        run: pnpm format:check

      - name: anti-pattern lint
        if: github.event_name == 'pull_request'
        run: pnpm tsx scripts/anti-pattern-lint.ts

      - name: schema dryrun
        run: pnpm tsx scripts/schema-dryrun.ts

      - name: parity check
        run: pnpm parity:check
