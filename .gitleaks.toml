# Extends gitleaks' built-in ruleset. Only adds allowlist entries for
# known placeholder values in .env.example that are not real secrets.
title = "Solo Compass gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "allowlist-env-example"
description = "Allow placeholder tokens in .env.example"
regex = '''(pk\.eyJ|xxxxx\.supabase\.co|sk-replace-me)'''

  [rules.allowlist]
  paths = ['''\.env\.example''', '''README\.md''']
  regexes = [
    # Mapbox public-token placeholder (pk.eyJ prefix — not a secret)
    '''pk\.eyJ''',
    # Supabase placeholder URL (not a real project URL)
    '''xxxxx\.supabase\.co''',
    # Literal placeholder API key used in docs / examples
    '''sk-replace-me''',
  ]

[allowlist]
description = "Global allowlist for placeholder values"
paths = ['''\.env\.example''', '''README\.md''', '''\.gitleaks\.toml''']
regexes = [
  '''pk\.eyJ''',
  '''xxxxx\.supabase\.co''',
  '''sk-replace-me''',
]
