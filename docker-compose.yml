services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: solo
      POSTGRES_PASSWORD: solo
      POSTGRES_DB: solocompass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solo -d solocompass"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
