name: SoloCompass
options:
  bundleIdPrefix: com.solocompass
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "6RG2F8YY59"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Manual

targets:
  SoloCompass:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoloCompass
        excludes:
          - Tests/**
    info:
      path: SoloCompass/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleIconName: AppIcon
        NSLocationWhenInUseUsageDescription: "Solo Compass uses your location to show experiences near you on the map."
        NSSpeechRecognitionUsageDescription: "Solo Compass uses speech recognition so you can describe what you're looking for by voice."
        NSMicrophoneUsageDescription: "Solo Compass uses the microphone for voice search."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solocompass.app
        INFOPLIST_FILE: SoloCompass/Resources/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: "6RG2F8YY59"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []

  SoloCompassTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoloCompass/Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solocompass.tests
    dependencies:
      - target: SoloCompass

schemes:
  SoloCompass:
    build:
      targets:
        SoloCompass: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SoloCompassTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
